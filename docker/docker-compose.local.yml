version: "3.9"

# Customer-local SummerPuppy deployment with Ollama
# Usage: docker-compose -f docker-compose.local.yml up

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  summer-puppy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - OLLAMA_ENABLED=true
      - LLM_ENABLED=false
      - LOG_LEVEL=INFO
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - sp_data:/app/data

volumes:
  ollama_data:
  sp_data:
